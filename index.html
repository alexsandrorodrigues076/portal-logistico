<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portal Logístico CD107</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800;900&family=Sora:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --blue:#0A2E73;
      --blue-deep:#06204F;
      --blue-mid:#1F4FB8;
      --orange:#D97706;
      --red:#D32027;
      --bg:#F4F6FB;
      --panel:#FFFFFF;
      --text:#101828;
      --muted:#667085;
      --border:#E6E9F0;
      --shadow:0 18px 46px rgba(16,24,40,.12),0 3px 9px rgba(16,24,40,.05);
      --radius:28px;
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family:Manrope,system-ui,-apple-system,Segoe UI,sans-serif;
      color:var(--text);
      background:
        radial-gradient(850px 420px at 5% -8%, rgba(10,46,115,.15), transparent 58%),
        radial-gradient(760px 380px at 96% 2%, rgba(217,119,6,.14), transparent 56%),
        linear-gradient(180deg,#FFFFFF 0%,var(--bg) 72%,#EEF2F8 100%);
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(105deg, transparent 0 38%, rgba(255,255,255,.52) 48%, transparent 60% 100%);
      transform:translateX(-92%);
      animation:sweep 4.8s cubic-bezier(.2,.8,.2,1) .35s both;
    }

    @keyframes sweep{to{transform:translateX(92%)}}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
    @keyframes floatIn{from{opacity:0;transform:scale(.96) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

    .page{
      min-height:100%;
      width:min(1120px, calc(100% - 40px));
      margin:0 auto;
      padding:28px 0;
      display:grid;
      grid-template-rows:auto 1fr;
      gap:26px;
    }

    .topbar{
      position:relative;
      min-height:112px;
      border-radius:var(--radius);
      border:1px solid rgba(230,233,240,.95);
      background:
        radial-gradient(540px 150px at 10% 0%, rgba(10,46,115,.08), transparent 62%),
        radial-gradient(540px 160px at 92% 0%, rgba(217,119,6,.10), transparent 60%),
        rgba(255,255,255,.90);
      box-shadow:var(--shadow);
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:22px;
      padding:24px 32px;
      overflow:hidden;
      animation:fadeDown .70s cubic-bezier(.2,.8,.2,1) both;
    }

    .topbar::after{
      content:"";
      position:absolute;
      left:26px;
      right:26px;
      bottom:0;
      height:5px;
      border-radius:999px 999px 0 0;
      background:linear-gradient(90deg,var(--blue) 0 72%,var(--orange) 72% 88%,var(--red) 88% 100%);
    }

    .brand{position:relative;z-index:1;display:flex;align-items:center;min-width:0}
    .zaffari{justify-content:flex-start}
    .wordmark{display:flex;flex-direction:column;line-height:.88}
    .brand-kicker{
      font-family:Sora,sans-serif;
      font-size:14px;
      font-weight:900;
      letter-spacing:.02em;
      color:var(--orange);
      text-transform:uppercase;
    }
    .brand-name{
      font-family:Sora,sans-serif;
      font-size:48px;
      font-weight:900;
      letter-spacing:-.075em;
      color:var(--blue);
      text-shadow:0 2px 0 rgba(10,46,115,.06);
    }

    .portal-title{
      position:relative;
      z-index:1;
      text-align:center;
      min-width:160px;
    }
    .portal-title strong{
      display:block;
      font-family:Sora,sans-serif;
      font-size:18px;
      font-weight:900;
      letter-spacing:-.03em;
      color:var(--blue-deep);
      line-height:1.1;
      white-space:nowrap;
    }
    .portal-title span{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin-top:8px;
      height:26px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid #DDE6F4;
      background:#F7FAFF;
      color:var(--muted);
      font-size:11px;
      font-weight:900;
      letter-spacing:.14em;
    }

    .stok{justify-content:flex-end}
    .stok-wordmark{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      line-height:.86;
      filter:drop-shadow(0 8px 10px rgba(16,24,40,.14));
    }
    .stok-main{
      font-family:Sora,Arial,sans-serif;
      font-size:62px;
      font-weight:900;
      letter-spacing:-.09em;
      color:#fff;
      -webkit-text-stroke:4.8px var(--red);
      paint-order:stroke fill;
      text-shadow:0 2px 0 rgba(90,45,30,.34),0 7px 12px rgba(16,24,40,.13);
    }
    .stok-sub{
      font-family:Sora,Arial,sans-serif;
      font-size:16px;
      font-weight:900;
      letter-spacing:.46em;
      color:#33343B;
      margin-top:12px;
      padding-right:1px;
    }
    .stok-sub::before,.stok-sub::after{
      content:"";
      display:inline-block;
      width:46px;
      height:1px;
      background:#C9CED6;
      vertical-align:middle;
      margin:0 12px 5px 0;
    }
    .stok-sub::after{margin:0 0 5px 12px}

    .hero{
      display:grid;
      place-items:center;
      padding:22px 0 36px;
    }

    .panel-card{
      width:min(520px, 100%);
      position:relative;
      border-radius:34px;
      background:rgba(255,255,255,.90);
      border:1px solid rgba(230,233,240,.96);
      box-shadow:var(--shadow);
      padding:12px;
      animation:floatIn .76s cubic-bezier(.2,.8,.2,1) .10s both;
      overflow:hidden;
    }

    .panel-card::before{
      content:"";
      position:absolute;
      width:240px;
      height:240px;
      border-radius:50%;
      right:-125px;
      top:-135px;
      background:radial-gradient(circle, rgba(217,119,6,.22), transparent 64%);
      pointer-events:none;
    }

    .panel-card::after{
      content:"";
      position:absolute;
      width:250px;
      height:250px;
      border-radius:50%;
      left:-145px;
      bottom:-160px;
      background:radial-gradient(circle, rgba(10,46,115,.17), transparent 66%);
      pointer-events:none;
    }

    .panel-link{
      position:relative;
      z-index:1;
      min-height:230px;
      border-radius:26px;
      padding:34px 32px;
      text-decoration:none;
      color:inherit;
      background:
        linear-gradient(180deg, rgba(255,255,255,.96) 0%, rgba(250,252,255,.94) 100%);
      border:1px solid rgba(230,233,240,.88);
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      justify-content:space-between;
      gap:26px;
      transition:transform .24s ease, box-shadow .24s ease, border-color .24s ease;
    }

    .panel-link:hover{
      transform:translateY(-4px);
      border-color:rgba(31,79,184,.32);
      box-shadow:0 22px 50px rgba(10,46,115,.16);
    }

    .panel-name{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .panel-name small{
      font-size:12px;
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--orange);
    }
    .panel-name b{
      font-family:Sora,sans-serif;
      font-size:34px;
      line-height:1.02;
      letter-spacing:-.055em;
      color:var(--blue-deep);
    }

    .open-row{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }
    .open-row span{
      font-size:13px;
      color:var(--muted);
      font-weight:800;
    }
    .open-btn{
      min-width:142px;
      height:48px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--blue) 0%,var(--blue-mid) 100%);
      color:#fff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:900;
      box-shadow:0 12px 26px rgba(10,46,115,.24);
      transition:transform .22s ease, box-shadow .22s ease;
    }
    .panel-link:hover .open-btn{
      transform:translateX(3px);
      box-shadow:0 16px 34px rgba(10,46,115,.30);
    }

    .pulse-line{
      position:absolute;
      left:44px;
      right:44px;
      top:0;
      height:4px;
      background:linear-gradient(90deg,var(--blue),var(--orange));
      border-radius:0 0 999px 999px;
      opacity:.92;
    }

    .ambient{
      position:fixed;
      inset:auto 10% 8% auto;
      width:92px;
      height:92px;
      border-radius:28px;
      background:linear-gradient(145deg, rgba(10,46,115,.09), rgba(217,119,6,.10));
      border:1px solid rgba(255,255,255,.55);
      animation:breathe 5.5s ease-in-out infinite;
      pointer-events:none;
    }

    @media(max-width:820px){
      .page{width:min(100% - 24px,1120px);padding:16px 0 24px}
      .topbar{grid-template-columns:1fr;justify-items:center;gap:12px;padding:22px 18px;min-height:auto}
      .zaffari,.stok{justify-content:center;width:100%}
      .stok-wordmark{align-items:center}
      .portal-title{order:-1}
      .brand-name{font-size:36px}
      .brand-kicker{font-size:11px}
      .stok-main{font-size:46px;-webkit-text-stroke:3.7px var(--red)}
      .stok-sub{font-size:11px;letter-spacing:.38em;margin-top:9px}
      .stok-sub::before,.stok-sub::after{width:28px;margin-right:9px}.stok-sub::after{margin-left:9px;margin-right:0}
      .panel-card{border-radius:28px}
      .panel-link{min-height:220px;padding:28px 24px;border-radius:22px}
      .panel-name b{font-size:29px}
      .open-row{align-items:flex-start;flex-direction:column}
      .open-btn{width:100%}
      .ambient{display:none}
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar" aria-label="Portal Logístico CD107">
      <div class="brand zaffari" aria-label="Comercial Zaffari">
        <div class="wordmark">
          <span class="brand-kicker">COMERCIAL</span>
          <span class="brand-name">zaffari</span>
        </div>
      </div>

      <div class="portal-title">
        <strong>Portal Logístico</strong>
        <span>CD107</span>
      </div>

      <div class="brand stok" aria-label="Stok Center">
        <div class="stok-wordmark">
          <span class="stok-main">Stok</span>
          <span class="stok-sub">CENTER</span>
        </div>
      </div>
    </header>

    <section class="hero" aria-label="Seleção de painel">
      <div class="panel-card">
        <div class="pulse-line"></div>
        <a class="panel-link" href="paineis/sorter-rampas.html">
          <span class="panel-name">
            <small>Painel disponível</small>
            <b>Sorter<br>Rampas PTL</b>
          </span>
          <span class="open-row">
            <span>Mapa e sugestão equalizada</span>
            <strong class="open-btn">Abrir painel</strong>
          </span>
        </a>
      </div>
    </section>
  </main>
  <div class="ambient"></div>
</body>
</html>
